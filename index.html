<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FP3級タイピング道場</title>
    <link rel="stylesheet" href="style.css?v=tokens-20260501" />
  </head>
  <body>
    <div id="app">
      <div id="start-screen" class="screen">
        <h1>FP3級<br>タイピング道場</h1>
        <div id="difficulty-select" aria-label="難易度選択">
          <label>
            <input type="radio" name="difficulty" value="1" checked />
            <span>初級</span>
          </label>
          <label>
            <input type="radio" name="difficulty" value="2" />
            <span>中級</span>
          </label>
          <label>
            <input type="radio" name="difficulty" value="3" />
            <span>上級</span>
          </label>
          <label>
            <input type="radio" name="difficulty" value="4" />
            <span>達人</span>
          </label>
        </div>
        <p class="message" aria-live="polite"><kbd>Space</kbd> をおしてスタート</p>
      </div>

      <div id="countdown-screen" class="screen hidden">
        <p id="countdown"></p>
      </div>

      <div id="typing-screen" class="screen hidden">
        <div id="info" aria-live="polite">
          <div class="metric">
            <span class="metric-label">Time</span>
            <span><span id="timer">0.0</span>s</span>
          </div>
          <div class="metric">
            <span class="metric-label">Score</span>
            <span><span id="score">0</span>pt</span>
          </div>
          <div class="metric">
            <span class="metric-label">Level</span>
            <span id="active-level">初級</span>
          </div>
        </div>
        <div id="prompt-panel">
          <span id="question-category">FP3級</span>
          <p id="question-display">問題を読み込み中</p>
        </div>
        <div id="question" aria-live="polite"></div>
        <p id="next-key">Next: <span>-</span></p>
      </div>

      <div id="result-screen" class="screen hidden">
        <h2>結果</h2>
        <p id="final-score"></p>
        <div id="final-stats">
          <div class="metric">
            <span class="metric-label">入力文字数</span>
            <span><span id="final-chars">0</span>文字</span>
          </div>
          <div class="metric">
            <span class="metric-label">速度</span>
            <span><span id="final-speed">0.0</span>文字/秒</span>
          </div>
          <div class="metric">
            <span class="metric-label">ミスタイプ率</span>
            <span><span id="final-mistype-rate">0.0</span>%</span>
          </div>
        </div>
        <button id="retry">もう一度挑戦する</button>
      </div>
    </div>

    <div id="virtual-keyboard">
      <div class="vk-row">
        <div class="vk-key" data-key="`">`</div>
        <div class="vk-key" data-key="1">1</div>
        <div class="vk-key" data-key="2">2</div>
        <div class="vk-key" data-key="3">3</div>
        <div class="vk-key" data-key="4">4</div>
        <div class="vk-key" data-key="5">5</div>
        <div class="vk-key" data-key="6">6</div>
        <div class="vk-key" data-key="7">7</div>
        <div class="vk-key" data-key="8">8</div>
        <div class="vk-key" data-key="9">9</div>
        <div class="vk-key" data-key="0">0</div>
        <div class="vk-key" data-key="-">-</div>
        <div class="vk-key" data-key="=">=</div>
      </div>
      <div class="vk-row">
        <div class="vk-key" data-key="q">Q</div>
        <div class="vk-key" data-key="w">W</div>
        <div class="vk-key" data-key="e">E</div>
        <div class="vk-key" data-key="r">R</div>
        <div class="vk-key" data-key="t">T</div>
        <div class="vk-key" data-key="y">Y</div>
        <div class="vk-key" data-key="u">U</div>
        <div class="vk-key" data-key="i">I</div>
        <div class="vk-key" data-key="o">O</div>
        <div class="vk-key" data-key="p">P</div>
        <div class="vk-key" data-key="[">[</div>
        <div class="vk-key" data-key="]">]</div>
        <div class="vk-key" data-key="¥">¥</div>
      </div>
      <div class="vk-row">
        <div class="vk-key" data-key="a">A</div>
        <div class="vk-key" data-key="s">S</div>
        <div class="vk-key" data-key="d">D</div>
        <div class="vk-key" data-key="f">F</div>
        <div class="vk-key" data-key="g">G</div>
        <div class="vk-key" data-key="h">H</div>
        <div class="vk-key" data-key="j">J</div>
        <div class="vk-key" data-key="k">K</div>
        <div class="vk-key" data-key="l">L</div>
        <div class="vk-key" data-key=";">;</div>
        <div class="vk-key" data-key="'">'</div>
      </div>
      <div class="vk-row">
        <div class="vk-key" data-key="z">Z</div>
        <div class="vk-key" data-key="x">X</div>
        <div class="vk-key" data-key="c">C</div>
        <div class="vk-key" data-key="v">V</div>
        <div class="vk-key" data-key="b">B</div>
        <div class="vk-key" data-key="n">N</div>
        <div class="vk-key" data-key="m">M</div>
        <div class="vk-key" data-key=",">,</div>
        <div class="vk-key" data-key=".">.</div>
        <div class="vk-key" data-key="/">/</div>
      </div>
      <div class="vk-row">
        <div class="vk-key wide" data-key="space">Space</div>
      </div>
    </div>

    <script type="module" src="script.js?v=tokens-20260501"></script>
  </body>
</html>
